# === SSID Patterns for Camera Detection ===
# Cameras broadcast these SSIDs in setup/AP mode
camera_ssid_patterns:
  hikvision:
    - "HIKVISION_*"
    - "IPCAM-*"
    - "HIK-*"
    - "DS-2CD*"
  dahua:
    - "DAP-*"
    - "DAHUA-*"
    - "IPC-*-*"
    - "DMSS_*"
  amcrest:
    - "Amcrest_*"
    - "Amcrest-IP*"
    - "AMCREST_WIFI_*"
  reolink:
    - "REOLINK_*"
    - "IPC_*"
  axis:
    - "AXIS-*"
    - "SetupAxis*"
  vivotek:
    - "VIVOTEK_*"
    - "IPCam_*"
  wyze:
    - "WyzeCam_*"
    - "WYZE_*"
  ring:
    - "Ring-*"
    - "Ring Setup*"
  nest:
    - "Nest Cam*"
  generic:
    - "IPCAM_*"
    - "IPCamera_*"
    - "Camera_*"
    - "WIFICAM_*"
    - "ONVIF_*"
    - "V380_*"
    - "CamHi_*"
    - "YCC365_*"
    - "CloudSEE_*"
    - "Eye4_*"

# === ALPR / Surveillance Infrastructure ===
alpr_ssid_patterns:
  - "*flock*"
  - "*Flock*"
  - "fs_*"
  - "*vigilant*"
  - "*rekor*"
  - "*projectnola*"
  - "*genetec*"
  - "*penguin*"
  - "*pigvision*"

# === Detection SSID regex (combined) ===
# For use in Python: re.compile(pattern, re.IGNORECASE)
detection_regex: "(?i)(hikvi|dahua|amcrest|reolink|axis|vivotek|ipcam|wificam|camera|onvif|v380|camhi|ycc365|ring.setup|wyzecam|nest.cam|eye4|cloudsee|flock|vigilant|rekor|projectnola|genetec)"

# === Ports for Active Auditing (Phase 2 only) ===
camera_ports:
  http: [80, 8080, 8081, 8888]
  https: [443, 8443]
  rtsp: [554, 8554]
  onvif: [80, 8080]  # ONVIF uses HTTP
  manufacturer_specific:
    dahua: [37777]
    hikvision: [8000, 37020]
    ubiquiti: [7441, 7447]
    xmeye: [34567]
  discovery:
    ws_discovery: [3702]
    ssdp: [1900]
    mdns: [5353]

# === RTSP Stream Paths (Phase 2 only) ===
rtsp_paths:
  hikvision:
    - "/Streaming/Channels/101"
    - "/Streaming/Channels/102"
    - "/live"
  dahua:
    - "/cam/realmonitor?channel=1&subtype=0"
    - "/cam/realmonitor?channel=1&subtype=1"
  axis:
    - "/axis-media/media.amp"
    - "/mjpg/video.mjpg"
  generic:
    - "/live"
    - "/ch0"
    - "/stream1"
    - "/video"
    - "/live/ch0"
    - "/live/ch1"
    - "/live/main"
    - "/live/sub"
    - "/media/video1"
    - "/onvif-media/media.amp"
